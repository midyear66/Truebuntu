<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="240" viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F4C81"/>
      <stop offset="100%" stop-color="#1CA7EC"/>
    </linearGradient>

    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B3A42"/>
      <stop offset="100%" stop-color="#1C252B"/>
    </linearGradient>
  </defs>

  <!-- Larger Dominant Circle -->
  <circle cx="120" cy="120" r="85"
          fill="none"
          stroke="url(#blueGrad)"
          stroke-width="16"/>

  <!-- Perfectly Centered NAS Stack -->
  <rect x="75" y="78" width="90" height="24" rx="5" fill="url(#serverGrad)"/>
  <rect x="75" y="108" width="90" height="24" rx="5" fill="url(#serverGrad)"/>
  <rect x="75" y="138" width="90" height="24" rx="5" fill="url(#serverGrad)"/>

  <!-- LEDs centered vertically in each bar -->
  <circle cx="150" cy="90" r="3" fill="#1CA7EC"/>
  <circle cx="150" cy="120" r="3" fill="#1CA7EC"/>
  <circle cx="150" cy="150" r="3" fill="#1CA7EC"/>

  <!-- Text block centered to circle midpoint -->
  <g transform="translate(240,120)">

    <text x="0"
          y="-20"
          dominant-baseline="middle"
          font-family="Segoe UI, Ubuntu, sans-serif"
          font-size="96"
          font-weight="600"
          fill="#1CA7EC">
      True<tspan fill="#1C252B">buntu</tspan>
    </text>

    <text x="4"
          y="50"
          dominant-baseline="middle"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="28"
          fill="#4A5A66"
          letter-spacing="0.5">
      Lightweight NAS OS • Enterprise Stability
    </text>

  </g>

</svg>
