services:
  truebuntu:
    build: .
    restart: unless-stopped
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - /etc/samba:/etc/samba
      - /etc/exports:/etc/exports
      - /etc/passwd:/etc/passwd:ro
      - /etc/shadow:/etc/shadow
      - /etc/chrony:/etc/chrony
      - /var/run/dbus:/var/run/dbus:ro
      - /etc/netplan:/etc/netplan
      - nas-data:/data
    env_file: .env

volumes:
  nas-data:
